<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canton Cyber Command</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 20px; }
        .nav-section { margin-bottom: 15px; padding: 10px; background: #1e1e1e; border-radius: 8px; }
        .tab-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; cursor: pointer; background: #2d2d2d; border-radius: 4px; border: 1px solid #444; }
        .tab:hover { background: #3d3d3d; }
        .active-tab { background: #007acc !important; border-color: #007acc; }
        .content-area { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .file-item { padding: 10px; border-bottom: 1px solid #333; font-family: monospace; cursor: pointer; color: #4da3ff; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .add-btn { background: #28a745; color: white; margin-left: 10px; }
        .folder-btn { background: #6f42c1; color: white; }
        textarea { width: 100%; height: 400px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Canton Cyber Command</h1>

    <div class="nav-section">
        <small>YEAR</small>
        <div class="tab-container" id="year-tabs">
            {% for year in hierarchy.keys() %}
                <div class="tab" onclick="selectYear('{{ year }}', this)">{{ year }}</div>
            {% endfor %}
        </div>
    </div>

    <div class="nav-section" id="semester-section" style="display:none;">
        <small>SEMESTER</small>
        <div class="tab-container" id="semester-tabs"></div>
    </div>

    <div class="nav-section" id="course-section" style="display:none;">
        <small>COURSE</small>
        <div class="tab-container" id="course-tabs"></div>
    </div>

    <div class="content-area">
        <div style="float: right;">
            <button class="btn folder-btn" onclick="newFolder()">+ New Folder</button>
            <button class="btn add-btn" onclick="newFile()">+ Add File</button>
        </div>
        <h3>Explorer</h3>
        <div id="file-list">Select a course to view files...</div>
        
        <div id="editor-container" style="display:none; margin-top:20px;">
            <hr>
            <h4 id="edit-title"></h4>
            <textarea id="editor"></textarea><br>
            <button class="btn add-btn" onclick="saveFile()">Save Changes</button>
        </div>
    </div>

    <script>
                let hierarchy = {{ hierarchy|tojson }};
        let selection = { year: null, semester: null, course: null };
        let currentFilePath = "";

        function selectYear(year, el) {
            selection = { year: year, semester: null, course: null };
            updateActive(el, '#year-tabs');
            const semContainer = document.getElementById('semester-tabs');
            semContainer.innerHTML = '';
            Object.keys(hierarchy[year]).forEach(sem => {
                semContainer.innerHTML += `<div class="tab" onclick="selectSemester('${sem}', this)">${sem}</div>`;
            });
            document.getElementById('semester-section').style.display = 'block';
            document.getElementById('course-section').style.display = 'none';
            document.getElementById('file-list').innerText = 'Select a semester...';
        }

        function selectSemester(sem, el) {
            selection.semester = sem;
            updateActive(el, '#semester-tabs');
            const courseContainer = document.getElementById('course-tabs');
            courseContainer.innerHTML = '';
            hierarchy[selection.year][sem].forEach(course => {
                courseContainer.innerHTML += `<div class="tab" onclick="selectCourse('${course}', this)">${course}</div>`;
            });
            document.getElementById('course-section').style.display = 'block';
            document.getElementById('file-list').innerText = 'Select a course...';
        }

        async function selectCourse(course, el) {
            selection.course = course;
            updateActive(el, '#course-tabs');
            const fullPath = `semester-01-${selection.semester}-${selection.year}/${course}`;
            const res = await fetch(`/get_files/${fullPath}`);
            const files = await res.json();
            
            const list = document.getElementById('file-list');
            list.innerHTML = files.length ? '' : 'No files found.';
            files.forEach(f => {
                list.innerHTML += `<div class="file-item" onclick="openFile('${fullPath}/${f}')">${f}</div>`;
            });
        }

        async function newFolder() {
    // Logic: Check if a course is selected first
    if (!selection.course) return alert("Select a course first!");

    const subFolderName = prompt("New subfolder name? (e.g., labs, notes, assignments)");
    if (!subFolderName) return;

    // Logic: Construct the full path automatically
    const fullSemesterPath = `semester-01-${selection.semester}-${selection.year}`;
    const targetPath = `${fullSemesterPath}/${selection.course}/${subFolderName}`;

    const res = await fetch('/create_folder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder_name: targetPath })
    });
    
    const result = await res.json();
    alert(result.message || result.error);
    
    // Refresh the list to show the new structure
    const activeCourseTab = document.querySelector('#course-tabs .active-tab');
    selectCourse(selection.course, activeCourseTab);
}


        async function newFile() {
            if (!selection.course) return alert("Select a course first!");
            const folder = prompt("Subfolder? (assignments/notes/labs/Discussion)", "notes");
            const filename = prompt("Filename (e.g., LawsonG_Lab1_CYBR172.md):");
            if (!filename) return;

            const res = await fetch('/add_file', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    semester: `semester-01-${selection.semester}-${selection.year}`,
                    course: selection.course,
                    folder: folder,
                    filename: filename 
                })
            });
            const result = await res.json();
            alert(result.message);
            // Refresh file list
            const activeCourseTab = document.querySelector('#course-tabs .active-tab');
            selectCourse(selection.course, activeCourseTab);
        }

        async function openFile(path) {
            currentFilePath = path;
            const res = await fetch(`/read_file/${path}`);
            const data = await res.json();
            document.getElementById('editor-container').style.display = 'block';
            document.getElementById('edit-title').innerText = "Editing: " + path;
            document.getElementById('editor').value = data.content;
        }

        async function saveFile() {
            const content = document.getElementById('editor').value;
            await fetch('/save_file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ filepath: currentFilePath, content: content })
            });
            alert("File Saved!");
        }

        function updateActive(el, containerId) {
            document.querySelectorAll(`${containerId} .tab`).forEach(t => t.classList.remove('active-tab'));
            el.classList.add('active-tab');
        }

    </script>
</body>
</html>
