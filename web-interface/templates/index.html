<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canton Cyber Command</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 20px; line-height: 1.5; }
        .nav-section { margin-bottom: 15px; padding: 15px; background: #1e1e1e; border-radius: 8px; border: 1px solid #333; }
        .tab-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .tab { padding: 8px 16px; cursor: pointer; background: #2d2d2d; border-radius: 4px; border: 1px solid #444; transition: 0.2s; }
        .tab:hover { background: #3d3d3d; }
        .active-tab { background: #007acc !important; border-color: #007acc; }
        .content-area { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #333; }
        .file-item { padding: 10px; border-bottom: 1px solid #333; font-family: monospace; cursor: pointer; color: #4da3ff; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .add-btn { background: #28a745; color: white; }
        .folder-btn { background: #6f42c1; color: white; }
        input, select { background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        textarea { width: 100%; height: 400px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 15px; border: 1px solid #333; margin-top: 10px; }
        
        .portfolio-section { margin-top: 40px; border-top: 2px solid #333; padding-top: 20px; }
        .project-card { border-left: 4px solid #004812; background: #1a1a1a; padding: 20px; margin: 15px 0; font-family: 'Courier New', monospace; }
        .tag { background: #004812; color: #fff; padding: 3px 10px; font-size: 0.75rem; border-radius: 3px; margin-right: 8px; }
    </style>
</head>
<body>
    <h1>Canton Cyber Command</h1>

    <div class="nav-section" style="border-color: #007acc;">
        <small style="color: #007acc; font-weight: bold;">ACADEMIC PLANNING</small>
        <div class="tab-container">
            <input type="text" id="plan-year" placeholder="Year (e.g., 2027)">
            <select id="plan-season">
                <option value="Spring">Spring</option>
                <option value="Fall">Fall</option>
                <option value="Summer">Summer</option>
            </select>
            <input type="text" id="plan-course" placeholder="Optional: Course ID">
            <button class="btn add-btn" onclick="executePlan()">+ Launch Tier</button>
        </div>
    </div>

    <div class="nav-section">
        <small>YEAR</small>
        <div class="tab-container" id="year-tabs">
            {% for year in hierarchy.keys()|sort %}
                <div class="tab" onclick="selectYear('{{ year }}', this)">{{ year }}</div>
            {% endfor %}
        </div>
    </div>

    <div class="nav-section" id="semester-section" style="display:none;">
        <small>SEMESTER</small>
        <div class="tab-container" id="semester-tabs"></div>
    </div>

    <div class="nav-section" id="course-section" style="display:none;">
        <small>COURSE</small>
        <div class="tab-container" id="course-tabs"></div>
    </div>

    <div class="content-area">
        <div style="float: right;">
            <button class="btn folder-btn" onclick="newFolder()">+ New Folder</button>
            <button class="btn add-btn" onclick="newFile()">+ Add File</button>
        </div>
        <h3>Explorer</h3>
        <div id="file-list">Select a course to view files...</div>
        
        <div id="editor-container" style="display:none; margin-top:20px;">
            <hr>
            <h4 id="edit-title"></h4>
            <textarea id="editor"></textarea><br>
            <button class="btn add-btn" onclick="saveFile()">Save Changes</button>
        </div>
    </div>

    <script>
        let hierarchy = {{ hierarchy|tojson }};
        let selection = { year: null, semester: null, course: null };

        async function executePlan() {
            const year = document.getElementById('plan-year').value;
            const season = document.getElementById('plan-season').value;
            const course = document.getElementById('plan-course').value;

            if (!year) return alert("Year is required.");

            const res = await fetch('/create_academic_tier', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ year, season, course })
            });
            const result = await res.json();
            alert(result.message);
            location.reload(); // Refresh state
        }

        function selectYear(year, el) {
            selection = { year: year, semester: null, course: null };
            updateActive(el, '#year-tabs');
            const semContainer = document.getElementById('semester-tabs');
            semContainer.innerHTML = '';
            Object.keys(hierarchy[year]).forEach(sem => {
                semContainer.innerHTML += `<div class="tab" onclick="selectSemester('${sem}', this)">${sem}</div>`;
            });
            document.getElementById('semester-section').style.display = 'block';
            document.getElementById('course-section').style.display = 'none';
        }

        function selectSemester(sem, el) {
            selection.semester = sem;
            updateActive(el, '#semester-tabs');
            const courseContainer = document.getElementById('course-tabs');
            courseContainer.innerHTML = '';
            hierarchy[selection.year][sem].forEach(course => {
                courseContainer.innerHTML += `<div class="tab" onclick="selectCourse('${course}', this)">${course}</div>`;
            });
            document.getElementById('course-section').style.display = 'block';
        }

        async function selectCourse(course, el) {
            selection.course = course;
            updateActive(el, '#course-tabs');
            const fullPath = `semester-01-${selection.semester}-${selection.year}/${course}`;
            const res = await fetch(`/get_files/${fullPath}`);
            const files = await res.json();
            const list = document.getElementById('file-list');
            list.innerHTML = files.length ? '' : 'No files found.';
            files.forEach(f => {
                list.innerHTML += `<div class="file-item" onclick="openFile('${fullPath}/${f}')">${f}</div>`;
            });
        }

        function updateActive(el, containerId) {
            document.querySelectorAll(`${containerId} .tab`).forEach(t => t.classList.remove('active-tab'));
            el.classList.add('active-tab');
        }

        // Add back your original openFile, saveFile, newFolder, and newFile functions here
    </script>
</body>
</html>
